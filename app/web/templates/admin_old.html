{% extends "layout.html" %}
{% block content %}
<h1 class="dash-title">管理者ページ</h1>

<section class="section">
    <h3>システム統計</h3>
    <div id="admin-stats" class="admin-stats">
        <p>読み込み中...</p>
    </div>
</section>

<section class="section">
    <h3>個体管理</h3>
    <div id="individuals-management">
        <div class="admin-controls">
            <button id="refresh-individuals">更新</button>
            <button id="export-data">データエクスポート</button>
        </div>
        <div id="individuals-list" class="admin-list"></div>
    </div>
</section>

<section class="section">
    <h3>個体詳細・編集</h3>
    <div id="individual-detail" class="admin-detail">
        <p>個体を選択してください</p>
    </div>
</section>

<section class="section">
    <h3>履歴管理</h3>
    <div id="history-management">
        <div id="history-list" class="admin-list"></div>
    </div>
</section>

<style>
.admin-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin: 1rem 0;
}
.stat-card {
    background: var(--bg-secondary);
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid var(--border-color);
}
.stat-value {
    font-size: 2rem;
    font-weight: bold;
    color: var(--primary-color);
}
.stat-label {
    font-size: 0.9rem;
    color: var(--text-muted);
}
.admin-controls {
    margin-bottom: 1rem;
}
.admin-controls button {
    margin-right: 0.5rem;
    padding: 0.5rem 1rem;
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.admin-controls button:hover {
    background: var(--primary-hover);
}
.admin-list {
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid var(--border-color);
    border-radius: 4px;
}
.admin-item {
    padding: 0.75rem;
    border-bottom: 1px solid var(--border-color);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.admin-item:hover {
    background: var(--bg-secondary);
}
.admin-item:last-child {
    border-bottom: none;
}
.admin-detail {
    background: var(--bg-secondary);
    padding: 1rem;
    border-radius: 4px;
    border: 1px solid var(--border-color);
}
.form-group {
    margin-bottom: 1rem;
}
.form-group label {
    display: block;
    margin-bottom: 0.25rem;
    font-weight: bold;
}
.form-group input {
    width: 100%;
    padding: 0.5rem;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background: var(--bg-primary);
    color: var(--text-primary);
}
.form-actions {
    margin-top: 1rem;
}
.form-actions button {
    margin-right: 0.5rem;
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.btn-primary {
    background: var(--primary-color);
    color: white;
}
.btn-danger {
    background: #dc3545;
    color: white;
}
.btn-warning {
    background: #ffc107;
    color: #212529;
}
.history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem;
    border-bottom: 1px solid var(--border-color);
}
.history-item:last-child {
    border-bottom: none;
}
.history-prob {
    font-weight: bold;
    color: var(--primary-color);
}
</style>

<script>
let currentIndividualId = null;

async function loadAdminStats() {
    try {
        const response = await fetch('/api/v1/admin/stats');
        const data = await response.json();
        
        const statsDiv = document.getElementById('admin-stats');
        statsDiv.innerHTML = `
            <div class="stat-card">
                <div class="stat-value">${data.total_individuals}</div>
                <div class="stat-label">登録個体数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${data.total_entries}</div>
                <div class="stat-label">総記録数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${data.total_users}</div>
                <div class="stat-label">ユーザー数</div>
            </div>
        `;
    } catch (error) {
        console.error('統計データの読み込みに失敗しました:', error);
    }
}

async function loadIndividuals() {
    try {
        const response = await fetch('/api/v1/admin/individuals');
        const data = await response.json();
        
        const listDiv = document.getElementById('individuals-list');
        listDiv.innerHTML = '';
        
        data.individuals.forEach(ind => {
            const item = document.createElement('div');
            item.className = 'admin-item';
            item.innerHTML = `
                <div>
                    <strong>${ind.uid}</strong>
                    <br>
                    <small>サイクル: ${ind.cycle_days.toFixed(1)}日 | 記録: ${ind.input_count}件</small>
                </div>
                <div>
                    <button onclick="selectIndividual(${ind.id})" class="btn-primary">選択</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    } catch (error) {
        console.error('個体リストの読み込みに失敗しました:', error);
    }
}

async function selectIndividual(indId) {
    currentIndividualId = indId;
    
    try {
        const response = await fetch(`/api/v1/admin/individuals/${indId}`);
        const ind = await response.json();
        
        const detailDiv = document.getElementById('individual-detail');
        detailDiv.innerHTML = `
            <h4>${ind.uid} の詳細</h4>
            <form id="individual-form">
                <div class="form-group">
                    <label>UID</label>
                    <input type="text" value="${ind.uid}" readonly>
                </div>
                <div class="form-group">
                    <label>周期日数</label>
                    <input type="number" id="cycle-days" value="${ind.cycle_days}" step="0.1" min="20" max="40">
                </div>
                <div class="form-group">
                    <label>トイレ平均回数</label>
                    <input type="number" id="toilet-avg" value="${ind.toilet_avg}" step="0.1" min="0">
                </div>
                <div class="form-group">
                    <label>記録数</label>
                    <input type="number" value="${ind.input_count}" readonly>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="updateIndividual()" class="btn-primary">更新</button>
                    <button type="button" onclick="loadIndividualHistory(${indId})" class="btn-warning">履歴表示</button>
                    <button type="button" onclick="resetIndividual(${indId})" class="btn-danger">リセット</button>
                </div>
            </form>
        `;
        
        // 履歴も自動的に読み込む
        loadIndividualHistory(indId);
    } catch (error) {
        console.error('個体詳細の読み込みに失敗しました:', error);
    }
}

async function updateIndividual() {
    if (!currentIndividualId) return;
    
    const cycleDays = parseFloat(document.getElementById('cycle-days').value);
    const toiletAvg = parseFloat(document.getElementById('toilet-avg').value);
    
    try {
        const response = await fetch(`/api/v1/admin/individuals/${currentIndividualId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                cycle_days: cycleDays,
                toilet_avg: toiletAvg
            })
        });
        
        if (response.ok) {
            alert('更新しました');
            loadIndividuals();
        } else {
            alert('更新に失敗しました');
        }
    } catch (error) {
        console.error('更新に失敗しました:', error);
        alert('更新に失敗しました');
    }
}

async function loadIndividualHistory(indId) {
    try {
        const response = await fetch(`/api/v1/admin/individuals/${indId}/history`);
        const data = await response.json();
        
        const historyDiv = document.getElementById('history-list');
        historyDiv.innerHTML = '<h4>履歴データ</h4>';
        
        data.history.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'history-item';
            const probPercent = (entry.final_prob * 100).toFixed(1);
            item.innerHTML = `
                <div>
                    <strong>${entry.date}</strong>
                    <br>
                    <small>痛み: ${entry.pain} | 運動: ${entry.gym} | 欠席: ${entry.absent}</small>
                </div>
                <div>
                    <span class="history-prob">${probPercent}%</span>
                    <button onclick="deleteHistoryEntry(${indId}, ${entry.id})" class="btn-danger" style="margin-left: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.8rem;">削除</button>
                </div>
            `;
            historyDiv.appendChild(item);
        });
    } catch (error) {
        console.error('履歴の読み込みに失敗しました:', error);
    }
}

async function deleteHistoryEntry(indId, entryId) {
    if (!confirm('本当に削除しますか？')) return;
    
    try {
        const response = await fetch(`/api/v1/admin/individuals/${indId}/history/${entryId}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            alert('削除しました');
            loadIndividualHistory(indId);
            loadIndividuals();
        } else {
            alert('削除に失敗しました');
        }
    } catch (error) {
        console.error('削除に失敗しました:', error);
        alert('削除に失敗しました');
    }
}

async function resetIndividual(indId) {
    if (!confirm('本当にリセットしますか？履歴が全て削除されます。')) return;
    
    try {
        const response = await fetch(`/api/v1/admin/individuals/${indId}/reset`, {
            method: 'POST'
        });
        
        if (response.ok) {
            alert('リセットしました');
            loadIndividuals();
            document.getElementById('individual-detail').innerHTML = '<p>個体を選択してください</p>';
            document.getElementById('history-list').innerHTML = '';
        } else {
            alert('リセットに失敗しました');
        }
    } catch (error) {
        console.error('リセットに失敗しました:', error);
        alert('リセットに失敗しました');
    }
}

// イベントリスナー
document.getElementById('refresh-individuals').addEventListener('click', loadIndividuals);

document.getElementById('export-data').addEventListener('click', async () => {
    try {
        const response = await fetch('/api/v1/admin/individuals');
        const data = await response.json();
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ranshi_kun_export_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
    } catch (error) {
        console.error('エクスポートに失敗しました:', error);
        alert('エクスポートに失敗しました');
    }
});

// 初期読み込み
loadAdminStats();
loadIndividuals();
</script>
{% endblock %}
