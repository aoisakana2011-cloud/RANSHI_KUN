<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "RANSHI_KUN" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='static.css') }}" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <a href="{{ url_for('web.dashboard') }}" class="nav-title">RANSHI_KUN<span class="nav-subtitle">（ミサトクション共同開発）</span></a>
        </div>
        <div class="nav-right">
            {% if current_user.is_authenticated %}
                {% if current_user.username == "admin" %}
                <a href="{{ url_for('web.admin_page') }}" class="nav-link">管理者</a>
                {% endif %}
                <span class="nav-user">{{ current_user.username }}</span>
                <form action="{{ url_for('web.logout') }}" method="post" class="logout-form">
                    <button type="submit" class="btn-logout">ログアウト</button>
                </form>
            {% endif %}
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
