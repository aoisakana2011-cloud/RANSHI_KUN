{% extends "layout.html" %}
{% block content %}
<h1 class="dash-title">RANSHI_KUN <span style="font-size:0.6em; color: var(--text-muted); font-weight:500">（ミサトクション共同開発）</span></h1>

<section class="section individual-section">
    <h3>登録済みの個体</h3>
    <div id="individual-list" class="individual-list"></div>
    <form id="add-individual-form" class="add-individual-form">
        <label>UID</label>
        <input type="text" id="new-uid" required placeholder="新規ID">
        <button type="submit">追加</button>
    </form>
</section>

<section class="section input-section">
    <h3>今日の行動を記録して予測</h3>
    <p class="form-criteria">※ 入力した「日付」の日の行動を記録し、その日の確率を出します。グラフは「今日」から60日分の予測です。</p>
    <div class="input-layout">
        <div class="single-panel">
            <form id="predict-form" class="predict-form">
                <div class="form-row">
                    <label>UID <span class="criteria">必須</span></label>
                    <input type="text" id="predict-uid" placeholder="例: user001" required>
                </div>
                <div class="form-row">
                    <label>日付 <span class="criteria">必須</span></label>
                    <input type="date" id="predict-date" required>
                </div>
                <div class="form-row">
                    <label>ジム回数 <span class="criteria">0〜5</span></label>
                    <input type="number" id="predict-gym" min="0" max="5" value="0">
                </div>
                <div class="form-row">
                    <label>欠席回数 <span class="criteria">0〜5</span></label>
                    <input type="number" id="predict-absent" min="0" max="5" value="0">
                </div>
                <div class="form-row">
                    <label>痛み <span class="criteria">0〜5（強さ）</span></label>
                    <input type="number" id="predict-pain" min="0" max="5" value="0">
                </div>
                <div class="form-row">
                    <label>頭痛 <span class="criteria">0〜5（強さ）</span></label>
                    <input type="number" id="predict-headache" min="0" max="5" value="0">
                </div>
                <div class="form-row">
                    <label>緊張 <span class="criteria">0〜5（強さ）</span></label>
                    <input type="number" id="predict-tone" min="0" max="5" value="0">
                </div>
                <div class="form-row">
                    <label>咳 <span class="criteria">0〜4</span></label>
                    <input type="number" id="predict-cough" min="0" max="4" value="0">
                </div>
            </form>
            
            <!-- トイレ詳細 -->
            <div class="toilet-section">
                <h4>トイレ詳細</h4>
                <div class="toilet-controls">
                    <button type="button" id="add-toilet-row" onclick="addToiletRow()">+ 行を追加</button>
                    <button type="button" id="clear-toilet" onclick="clearToiletRows()">クリア</button>
                </div>
                <div class="toilet-table-container">
                    <div class="table-header">
                        <span>回数</span>
                        <span>時刻</span>
                        <span>所要時間 (分)</span>
                        <span>操作</span>
                    </div>
                    <div class="table-body" id="toilet-table-body">
                        <!-- 初期状態では空 -->
                    </div>
                </div>
            </div>
            
            <!-- 薬剤服用 -->
            <div class="meds-section">
                <h4>薬剤服用</h4>
                <div class="meds-controls">
                    <button type="button" id="add-med-row" onclick="addMedRow()">+ 薬を追加</button>
                    <button type="button" id="clear-meds" onclick="clearMedRows()">クリア</button>
                </div>
                <div class="meds-table-container">
                    <div class="meds-table-header">
                        <span>薬剤</span>
                        <span>種類</span>
                        <span>名称</span>
                        <span>時刻</span>
                        <span>操作</span>
                    </div>
                    <div class="meds-table-body" id="meds-table-body">
                        <!-- 初期状態では空 -->
                    </div>
                </div>
            </div>
            
            <!-- 予測・登録ボタン -->
            <div class="form-buttons">
                <button type="button" id="register-btn">登録</button>
                <button type="button" id="predict-btn">予測</button>
            </div>
            
            <div id="predict-result" class="predict-result"></div>
            <div id="chart-wrap" class="chart-wrap" style="display:none;">
                <canvas id="prediction-chart"></canvas>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
let currentUid = null;
let medsData = {};

// 薬剤データを読み込み
async function loadMedsData() {
    try {
        const response = await fetch('/data/meds_list.json');
        if (!response.ok) {
            throw new Error('Failed to load meds data');
        }
        medsData = await response.json();
        console.log('Meds data loaded:', medsData);
    } catch (error) {
        console.error('Error loading meds data:', error);
        // フォールバックデータ
        medsData = {
            "生理のときにしかほぼ使わない薬": [
                "ロキソプロフェンナトリウム（ロキソニン）",
                "イブプロフェン（ブルフェン）",
                "ジクロフェナクナトリウム（ボルタレン）"
            ],
            "日用でも生理でも使う薬": [
                "アセトアミノフェン（カロナール / タイレノール）",
                "ファモチジン（ガスター）",
                "エソメプラゾール（ネキシウム）"
            ],
            "花粉症の薬": [
                "フェキソフェナジン（アレグラ）",
                "セチリジン（ジルテック）",
                "ロラタジン（クラリチン）"
            ],
            "その他の薬": [
                "バファリンA",
                "イブA錠",
                "ビタミンCサプリメント"
            ]
        };
    }
}

// トイレ行を追加
function addToiletRow() {
    const body = document.getElementById("toilet-table-body");
    const rowCount = body.children.length + 1;
    
    const row = document.createElement("div");
    row.className = "toilet-row";
    
    // 回数
    const countCell = document.createElement("span");
    countCell.textContent = rowCount + "回目";
    row.appendChild(countCell);
    
    // 時刻
    const timeInput = document.createElement("input");
    timeInput.type = "time";
    timeInput.value = formatTime(new Date());
    row.appendChild(timeInput);
    
    // 所要時間
    const durationInput = document.createElement("input");
    durationInput.type = "number";
    durationInput.min = "1";
    durationInput.max = "60";
    durationInput.value = "3";
    row.appendChild(durationInput);
    
    // 削除ボタン
    const deleteBtn = document.createElement("button");
    deleteBtn.type = "button";
    deleteBtn.textContent = "削除";
    deleteBtn.onclick = () => row.remove();
    deleteBtn.style.padding = "0.25rem";
    deleteBtn.style.fontSize = "0.7rem";
    row.appendChild(deleteBtn);
    
    body.appendChild(row);
    updateToiletRowCount();
}

// トイレ行をすべてクリア
function clearToiletRows() {
    const body = document.getElementById("toilet-table-body");
    body.innerHTML = "";
}

// トイレ行の番号を更新
function updateToiletRowCount() {
    const rows = document.querySelectorAll(".toilet-row");
    rows.forEach((row, index) => {
        const countCell = row.querySelector("span");
        if (countCell) {
            countCell.textContent = (index + 1) + "回目";
        }
    });
}

// トイレ表を更新（古い関数は残すが使用しない）
function updateToiletTable() {
    // この関数はもう使用しない
}

// トイレデータを収集
function collectToiletData() {
    const toiletData = [];
    const rows = document.querySelectorAll(".toilet-row");
    
    rows.forEach(row => {
        const timeInput = row.querySelector('input[type="time"]');
        const durationInput = row.querySelector('input[type="number"]');
        
        if (timeInput.value && durationInput.value) {
            toiletData.push({
                time: timeInput.value,
                duration_min: parseInt(durationInput.value)
            });
        }
    });
    
    return toiletData;
}
// 薬剤行を追加
function addMedRow() {
    const body = document.getElementById("meds-table-body");
    const rowCount = body.children.length + 1;
    
    const row = document.createElement("div");
    row.className = "med-row";
    
    // 番号
    const numberCell = document.createElement("span");
    numberCell.className = "med-number";
    numberCell.textContent = rowCount;
    row.appendChild(numberCell);
    
    // カテゴリ選択
    const categorySelect = document.createElement("select");
    categorySelect.className = "med-category";
    categorySelect.innerHTML = `
        <option value="">薬の種類を選択</option>
        <option value="生理のときにしかほぼ使わない薬">生理のときにしかほぼ使わない薬</option>
        <option value="日用でも生理でも使う薬">日用でも生理でも使う薬</option>
        <option value="花粉症の薬">花粉症の薬</option>
        <option value="その他の薬">その他の薬</option>
    `;
    categorySelect.onchange = () => updateMedNameOptions(categorySelect);
    row.appendChild(categorySelect);
    
    // 名称選択
    const nameSelect = document.createElement("select");
    nameSelect.className = "med-name";
    nameSelect.innerHTML = '<option value="">名称不明</option>';
    row.appendChild(nameSelect);
    
    // 時刻入力
    const timeInput = document.createElement("input");
    timeInput.type = "time";
    timeInput.className = "med-time";
    timeInput.value = formatTime(new Date());
    row.appendChild(timeInput);
    
    // 削除ボタン
    const deleteBtn = document.createElement("button");
    deleteBtn.type = "button";
    deleteBtn.textContent = "削除";
    deleteBtn.onclick = () => {
        row.remove();
        updateMedRowCount();
    };
    row.appendChild(deleteBtn);
    
    body.appendChild(row);
    updateMedRowCount();
}

// 薬剤行をすべてクリア
function clearMedRows() {
    const body = document.getElementById("meds-table-body");
    body.innerHTML = "";
}

// 薬剤行の番号を更新
function updateMedRowCount() {
    const rows = document.querySelectorAll(".med-row");
    rows.forEach((row, index) => {
        const numberCell = row.querySelector(".med-number");
        if (numberCell) {
            numberCell.textContent = index + 1;
        }
    });
}

// 薬剤名称オプションを更新
function updateMedNameOptions(categorySelect) {
    const row = categorySelect.closest(".med-row");
    const nameSelect = row.querySelector(".med-name");
    const category = categorySelect.value;
    
    // 名称不明を最初に追加
    nameSelect.innerHTML = '<option value="">名称不明</option>';
    
    if (category && medsData[category]) {
        medsData[category].forEach(med => {
            const option = document.createElement("option");
            option.value = med;
            option.textContent = med;
            nameSelect.appendChild(option);
        });
    }
}

// 薬剤データを収集（更新版）
function collectMedsData() {
    const medsData = [];
    const rows = document.querySelectorAll(".med-row");
    
    rows.forEach(row => {
        const category = row.querySelector('.med-category').value;
        const name = row.querySelector('.med-name').value;
        const time = row.querySelector('.med-time').value;
        
        if (category && time) {
            medsData.push({
                name: name || "名称不明",
                category: category,
                time: time
            });
        }
    });
    
    return medsData;
}

// 薬剤カテゴリが変更されたときの処理
function updateMedOptions(medId) {
    const category = document.getElementById(`${medId}-category`).value;
    const nameSelect = document.getElementById(`${medId}-name`);
    
    // 名称不明を最初に追加
    nameSelect.innerHTML = '<option value="">名称不明</option>';
    
    if (category && medsData[category]) {
        medsData[category].forEach(med => {
            const option = document.createElement("option");
            option.value = med;
            option.textContent = med;
            nameSelect.appendChild(option);
        });
    }
    
    console.log(`Updated ${medId} options for category: ${category}`, medsData[category]);
}

let predictionChart = null;

function parseYMD(s) {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
}

function daysBetween(d0, d1) {
    return Math.round((d1 - d0) / 86400000);
}

function normalPDF(x, mu, sigma) {
    if (sigma <= 0) return 0;
    return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
}

function drawPredictionChart(dates, percent, centerDate, sigma) {
    const wrap = document.getElementById("chart-wrap");
    const canvas = document.getElementById("prediction-chart");
    if (!dates.length) {
        wrap.style.display = "none";
        return;
    }
    wrap.style.display = "block";

    const firstDate = parseYMD(dates[0]);
    const center = parseYMD(centerDate);
    const muPos = daysBetween(firstDate, center);
    const sigmaNum = Number(sigma) || 2;
    const maxBar = Math.max(...percent, 0.01);
    const truePdfMax = 1 / (sigmaNum * Math.sqrt(2 * Math.PI));
    const scale = maxBar / 100 / truePdfMax;
    const normalCurve = dates.map((_, i) => normalPDF(i, muPos, sigmaNum) * scale * 100);

    const labels = dates.map(d => {
        const [y, m, day] = d.split("-");
        return m + "/" + day;
    });

    if (predictionChart) predictionChart.destroy();
    predictionChart = new Chart(canvas, {
        type: "bar",
        data: {

async function loadIndividuals() {
    const res = await fetch("/api/v1/individuals");
    const data = await res.json();
    const list = document.getElementById("individual-list");
    list.innerHTML = "";
    data.forEach(ind => {
        const div = document.createElement("div");
        div.className = "individual-item";
        div.innerHTML = "<strong>" + ind.uid + "</strong><button type=\"button\" onclick=\"event.stopPropagation(); loadHistory('" + ind.uid.replace(/'/g, "\\'") + "')\">履歴を見る</button>";
        div.addEventListener("click", () => {
            currentUid = ind.uid;
            document.getElementById("predict-uid").value = ind.uid;
        });
        list.appendChild(div);
    });
}

async function loadHistory(uid) {
    currentUid = uid;
    document.getElementById("predict-uid").value = uid;
    const res = await fetch("/api/v1/history/" + encodeURIComponent(uid));
    const data = await res.json();
    const list = document.getElementById("history-list");
    list.innerHTML = "";
    data.forEach(h => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = "<span>" + h.date + "</span><span>score: " + h.raw_score + "</span><span>prob: " + h.final_prob + "</span>";
        list.appendChild(div);
    });
}

// 現在時刻を薬剤時刻入力欄に設定
function setCurrentTimeToMeds() {
    const now = new Date();
    const currentTime = formatTime(now);
    
    for (let i = 1; i <= 3; i++) {
        const timeInput = document.getElementById(`med${i}-time`);
        if (timeInput && !timeInput.value) {
            timeInput.value = currentTime;
        }
    }
}

// 時刻フォーマット
function formatTime(date) {
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    return `${hours}:${minutes}`;
}

// 予測結果を表示
function displayPredictionResult(data) {
    const out = document.getElementById("predict-result");
    const todayProb = (data.entry && data.entry.final_prob != null ? data.entry.final_prob : 0) * 100;
    const dates = data.prediction && data.prediction.dates ? data.prediction.dates : [];
    const percent = data.prediction && data.prediction.percent ? data.prediction.percent : [];
    const centerDate = (data.prediction && data.prediction.center_date) || "";
    const sigma = (data.prediction && data.prediction.sigma) != null ? data.prediction.sigma : 2;

    const pairs = dates.map((d, i) => ({ date: d, p: percent[i] || 0 }));
    pairs.sort((a, b) => b.p - a.p);
    const top = pairs.slice(0, 5);

    let html = "<strong>" + (data.uid || "") + "</strong> の " + (data.entry && data.entry.date) + " の推定: " + todayProb.toFixed(1) + "%<br>";
    html += "中心日（予測ピーク）: " + centerDate + " &nbsp; σ=" + sigma.toFixed(2) + " 日<br>";
    html += "確率が高い日 上位5日:<br>";
    top.forEach(function (t) {
        html += t.date + ": " + t.p.toFixed(1) + "%<br>";
    });
    out.innerHTML = html;

    loadHistory(data.uid || "");
}

// 評価システム関数
async function loadEvaluation() {
    const uid = document.getElementById('eval-uid').value.trim();
    if (!uid) {
        alert('UIDを入力してください');
        return;
    }

    try {
        // 履歴データを取得
        const historyResponse = await fetch(`/api/v1/history/${encodeURIComponent(uid)}`);
        const historyData = await historyResponse.json();
        
        // 個体情報を取得
        const individualsResponse = await fetch('/api/v1/individuals');
        const individualsData = await individualsResponse.json();
        const individual = individualsData.find(ind => ind.uid === uid);
        
        if (!individual || historyData.length === 0) {
            document.getElementById('evaluation-results').innerHTML = '<p>評価データがありません</p>';
            return;
        }

        // 評価指標を計算
        const evaluation = calculatePredictionAccuracy(historyData, individual);
        displayEvaluationResults(evaluation);
        
    } catch (error) {
        console.error('評価データの読み込みに失敗しました:', error);
        document.getElementById('evaluation-results').innerHTML = '<p>評価データの読み込みに失敗しました</p>';
    }
}

function calculatePredictionAccuracy(history, individual) {
    const highProbEntries = history.filter(entry => entry.final_prob >= 0.6);
    const totalEntries = history.length;
    
    // 周期予測の正確性
    const actualCycleDays = individual.cycle_days;
    const predictedCycleDays = calculateAverageCycleFromHistory(history);
    const cycleAccuracy = Math.max(0, 100 - Math.abs(actualCycleDays - predictedCycleDays) / actualCycleDays * 100);
    
    // 高確率予測の割合
    const highProbRatio = (highProbEntries.length / totalEntries) * 100;
    
    // 予測信頼度の平均
    const avgConfidence = history.reduce((sum, entry) => sum + entry.final_prob, 0) / totalEntries;
    
    // スコア分布
    const scoreDistribution = calculateScoreDistribution(history);
    
    // 最近の改善傾向
    const recentTrend = calculateRecentTrend(history);
    
    return {
        totalEntries,
        highProbEntries: highProbEntries.length,
        cycleAccuracy,
        highProbRatio,
        avgConfidence,
        scoreDistribution,
        recentTrend,
        actualCycleDays,
        predictedCycleDays
    };
}

function calculateAverageCycleFromHistory(history) {
    if (history.length < 2) return 28;
    
    // 高確率日間の平均間隔を計算
    const highProbDates = history
        .filter(entry => entry.final_prob >= 0.6)
        .map(entry => new Date(entry.date))
        .sort((a, b) => a - b);
    
    if (highProbDates.length < 2) return 28;
    
    let totalDays = 0;
    let intervals = 0;
    
    for (let i = 1; i < highProbDates.length; i++) {
        const daysDiff = (highProbDates[i] - highProbDates[i-1]) / (1000 * 60 * 60 * 24);
        if (daysDiff > 10 && daysDiff < 50) { // 妥当な周期範囲
            totalDays += daysDiff;
            intervals++;
        }
    }
    
    return intervals > 0 ? totalDays / intervals : 28;
}

function calculateScoreDistribution(history) {
    const ranges = {
        '0-20%': 0,
        '20-40%': 0,
        '40-60%': 0,
        '60-80%': 0,
        '80-100%': 0
    };
    
    history.forEach(entry => {
        const prob = entry.final_prob * 100;
        if (prob < 20) ranges['0-20%']++;
        else if (prob < 40) ranges['20-40%']++;
        else if (prob < 60) ranges['40-60%']++;
        else if (prob < 80) ranges['60-80%']++;
        else ranges['80-100%']++;
    });
    
    return ranges;
}

function calculateRecentTrend(history) {
    if (history.length < 10) return 'insufficient_data';
    
    const recent = history.slice(-10);
    const older = history.slice(-20, -10);
    
    if (older.length === 0) return 'insufficient_data';
    
    const recentAvg = recent.reduce((sum, entry) => sum + entry.final_prob, 0) / recent.length;
    const olderAvg = older.reduce((sum, entry) => sum + entry.final_prob, 0) / older.length;
    
    const diff = recentAvg - olderAvg;
    
    if (diff > 0.1) return 'improving';
    else if (diff < -0.1) return 'declining';
    else return 'stable';
}

function displayEvaluationResults(evaluation) {
    const resultsDiv = document.getElementById('evaluation-results');
    
    const accuracyClass = evaluation.cycleAccuracy >= 80 ? 'accuracy-high' : 
                        evaluation.cycleAccuracy >= 60 ? 'accuracy-medium' : 'accuracy-low';
    
    const trendText = {
        'improving': '改善中 ↗',
        'declining': '低下中 ↘',
        'stable': '安定 →',
        'insufficient_data': 'データ不足'
    };
    
    const trendClass = {
        'improving': 'accuracy-high',
        'declining': 'accuracy-low',
        'stable': 'accuracy-medium',
        'insufficient_data': ''
    };
    
    resultsDiv.innerHTML = `
        <div style="margin-bottom: 1rem;">
            <h4>予測精度評価</h4>
            <div class="eval-metric">
                <div class="metric-value ${accuracyClass}">${evaluation.cycleAccuracy.toFixed(1)}%</div>
                <div class="metric-label">周期予測精度</div>
            </div>
            <div class="eval-metric">
                <div class="metric-value">${evaluation.totalEntries}</div>
                <div class="metric-label">総記録数</div>
            </div>
            <div class="eval-metric">
                <div class="metric-value">${evaluation.highProbEntries}</div>
                <div class="metric-label">高確率日数</div>
            </div>
            <div class="eval-metric">
                <div class="metric-value">${evaluation.avgConfidence.toFixed(3)}</div>
                <div class="metric-label">平均信頼度</div>
            </div>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <h4>周期情報</h4>
            <p>実際の周期: ${evaluation.actualCycleDays.toFixed(1)}日</p>
            <p>予測周期: ${evaluation.predictedCycleDays.toFixed(1)}日</p>
            <p>高確率日割合: ${evaluation.highProbRatio.toFixed(1)}%</p>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <h4>最近の傾向: <span class="${trendClass[evaluation.recentTrend]}">${trendText[evaluation.recentTrend]}</span></h4>
        </div>
        
        <div>
            <h4>確率分布</h4>
            ${Object.entries(evaluation.scoreDistribution).map(([range, count]) => 
                `<span style="margin-right: 1rem;">${range}: ${count}件</span>`
            ).join('')}
        </div>
    `;
}
